<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام استعلام نتائج الطلاب</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: right;
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
            text-align: center;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: right;
            animation: fadeIn 0.5s ease;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .error {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            text-align: center;
        }
        .result-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 8px;
            margin-bottom: 12px;
            text-align: center;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام نتائج الطلاب 🎓</h2>
    <p class="subtitle">يرجى إدخال رقم البطاقة والرمز السري للاستعلام عن نتيجتك</p>
    
    <div class="form-group">
        <label for="cardNo">رقم البطاقة:</label>
        <input type="text" id="cardNo" placeholder="أدخل رقم البطاقة هنا" required>
    </div>
    
    <div class="form-group">
        <label for="secretCode">الرمز السري:</label>
        <input type="password" id="secretCode" placeholder="أدخل الرمز السري هنا" required>
    </div>
    
    <button onclick="checkResult()">استعلام عن النتيجة</button>
    
    <div id="resultBox" class="result-box"></div>
</div>

<script>
    // === هنا تضع بيانات نتائج الطلاب ===
    const studentsDatabase = [
        {
            cardNo: "112233",         // رقم البطاقة للطالب الأول
            secretCode: "1234",       // الرمز السري له
            name: "أحمد علي حسين",    // اسم الطالب
            score: "85%",             // المعدل
            grade: "جيد جداً",        // التقدير
            status: "ناجح"            // الحالة
        },
        {
            cardNo: "445566",         // رقم البطاقة للطالب الثاني
            secretCode: "5678",       // الرمز السري
            name: "سارة محمد أحمد",   // الاسم
            score: "94%",             // المعدل
            grade: "امتياز",          // التقدير
            status: "ناجح"            // الحالة
        },
        {
            cardNo: "778899",         // رقم البطاقة للطالب الثالث
            secretCode: "9000",       // الرمز السري
            name: "حسن خالد محمود",   // الاسم
            score: "45%",             // المعدل
            grade: "ضعيف",            // التقدير
            status: "راسب"            // الحالة
        }
    ];

    function checkResult() {
        const cardInput = document.getElementById('cardNo').value.trim();
        const codeInput = document.getElementById('secretCode').value.trim();
        const resultBox = document.getElementById('resultBox');
        
        resultBox.style.display = 'none';
        resultBox.className = 'result-box';
        
        if (cardInput === "" || codeInput === "") {
            resultBox.innerHTML = "يرجى ملء كافة الحقول أولاً.";
            resultBox.classList.add('error');
            resultBox.style.display = 'block';
            return;
        }
        
        const student = studentsDatabase.find(s => s.cardNo === cardInput && s.secretCode === codeInput);
        
        if (student) {
            const statusClass = student.status === "ناجح" ? "success" : "fail";
            resultBox.classList.add(statusClass);
            
            resultBox.innerHTML = `
                <div class="result-title">نتيجة الطالب</div>
                <div class="result-row"><strong>الاسم:</strong> <span>${student.name}</span></div>
                <div class="result-row"><strong>المعدل:</strong> <span>${student.score}</span></div>
                <div class="result-row"><strong>التقدير:</strong> <span>${student.grade}</span></div>
                <div class="result-row"><strong>الحالة:</strong> <strong>${student.status}</strong></div>
            `;
        } else {
            resultBox.innerHTML = "عذراً، رقم البطاقة أو الرمز السري غير صحيح. يرجى التحقق وإعادة المحاولة.";
            resultBox.classList.add('error');
        }
        
        resultBox.style.display = 'block';
    }
</script>

</body>
  </html>
